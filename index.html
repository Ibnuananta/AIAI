<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIAI</title>
  <link rel="stylesheet" href="./style.css?v=3" />
</head>
<body>
  <main class="chatgpt-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-mark">A</div>
        <div class="brand-copy">
          <p class="eyebrow">Private AI assistant</p>
          <h1>AIAI</h1>
        </div>
        <span class="status-pill">Online</span>
      </div>
    </header>

    <section class="conversation" aria-label="AI chatbot">
      <div id="chatBox" class="chat-box">
        <div class="message-row assistant-row">
          <div class="avatar assistant-avatar">A</div>
          <div class="message-content">
            <div class="message-name">AIAI</div>
            <div class="message-text">Halo, aku AIAI. Ada yang bisa aku bantu hari ini?</div>
          </div>
        </div>
      </div>

      <div class="composer-wrap">
        <form id="chatForm" class="chat-form">
          <input
            type="text"
            id="userInput"
            placeholder="Ketik pesan untuk AIAI..."
            autocomplete="off"
            required
          />
          <button type="submit" aria-label="Kirim pesan">➜</button>
        </form>
        <p class="composer-note">AIAI dapat membuat kesalahan. Periksa kembali jawaban penting.</p>
      </div>
    </section>
  </main>

  <script src="./script.js?v=3"></script>
</body>
</html>
